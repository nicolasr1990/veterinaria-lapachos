<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veterinaria Los Lapachos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #faf5f0 0%, #f5ede3 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
        }

        /* Logo animado */
        .logo-container {
            margin-bottom: 3rem;
            animation: fadeInDown 1s ease-out;
        }

        .logo {
            width: 180px;
            height: 180px;
            margin: 0 auto;
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 10px 25px rgba(0,0,0,0.15));
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Título */
        .title {
            font-size: 2rem;
            font-weight: 700;
            color: #8b1538;
            margin-bottom: 0.5rem;
            animation: fadeIn 1s ease-out 0.3s both;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #6b7280;
            margin-bottom: 3rem;
            animation: fadeIn 1s ease-out 0.5s both;
        }

        /* Botones */
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            animation: fadeInUp 1s ease-out 0.7s both;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            padding: 1.5rem 2rem;
            font-size: 1.2rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 16px;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }

        .btn:active {
            transform: translateY(-2px);
        }

        /* Botón Ver Resúmenes */
        .btn-dashboard {
            background: linear-gradient(135deg, #8b1538 0%, #a01d45 100%);
            color: white;
        }

        .btn-dashboard:hover {
            background: linear-gradient(135deg, #a01d45 0%, #b52552 100%);
        }

        /* Botón Caja Chica */
        .btn-caja {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
        }

        .btn-caja:hover {
            background: linear-gradient(135deg, #059669 0%, #047857 100%);
        }

        /* Iconos */
        .btn-icon {
            font-size: 1.5rem;
        }

        /* Animaciones */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-15px);
            }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .logo {
                width: 140px;
                height: 140px;
            }

            .title {
                font-size: 1.6rem;
            }

            .subtitle {
                font-size: 1rem;
            }

            .btn {
                padding: 1.2rem 1.5rem;
                font-size: 1.1rem;
            }

            .btn-icon {
                font-size: 1.3rem;
            }
        }

        /* Partículas decorativas */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .particle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: rgba(139, 21, 56, 0.1);
            border-radius: 50%;
            animation: particle-float 15s infinite ease-in-out;
        }

        .particle:nth-child(1) { left: 10%; animation-delay: 0s; }
        .particle:nth-child(2) { left: 20%; animation-delay: 2s; }
        .particle:nth-child(3) { left: 30%; animation-delay: 4s; }
        .particle:nth-child(4) { left: 40%; animation-delay: 6s; }
        .particle:nth-child(5) { left: 50%; animation-delay: 8s; }
        .particle:nth-child(6) { left: 60%; animation-delay: 10s; }
        .particle:nth-child(7) { left: 70%; animation-delay: 12s; }
        .particle:nth-child(8) { left: 80%; animation-delay: 14s; }

        @keyframes particle-float {
            0%, 100% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) scale(1);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <!-- Partículas decorativas -->
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div class="container">
        <!-- Logo animado -->
        <div class="logo-container">
            <div class="logo">
                <img src="logo.png" alt="Veterinaria Los Lapachos">
            </div>
        </div>

        <!-- Título -->
        <h1 class="title">Veterinaria Los Lapachos</h1>
        <p class="subtitle">Sistema de Gestión</p>

        <!-- Botones de navegación -->
        <div class="buttons">
            <a href="dashboard.html" class="btn btn-dashboard">
                <span class="btn-icon">📊</span>
                <span>Ver Resúmenes</span>
            </a>
            
            <a href="https://nicolasr1990.github.io/caja_veterinaria/" class="btn btn-caja">
                <span class="btn-icon">💰</span>
                <span>Caja Chica</span>
            </a>
        </div>
    </div>
</body>
</html>
